<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Notificação - Dashboard</title>
    <style>
    :root {
        --primary-color: #0058cc;
        --primary-hover: #005fa3;
        --bg-body: #c7c9c9;
        --bg-card: #ffffff;
        --text-main: #1f1d1d;
        --border-color: #070575;
        --input-bg: #d8e2e3;
        --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        --border-radius: 8px;
        --drop-zone-bg: #f8f9fa;
        --drop-zone-border: #cbd5e0;
    }
    body.theme-gold { --primary-color: #b8860b; --primary-hover: #8b6508; --bg-body:#bd8d15; --border-color: #f57c02; --input-bg: #f8fcf9; --drop-zone-border: #ddff00; }
    body.theme-pink { --primary-color: #e91e63; --primary-hover: #c2185b; --bg-body:#cf6da0; --border-color: #d10049; --input-bg: #f8fcf9; --drop-zone-border: #9e5a72; }
    body.theme-purple { --primary-color: #9c27b0; --primary-hover: #7b1fa2; --bg-body:#4f14a3; --border-color: #9f2df7; --input-bg: #f8fcf9; --drop-zone-border: #b65fe8;}
    body.theme-palmeiras { --primary-color: #006437; --primary-hover: #044427; --bg-body: #15752c; --border-color: #badbcc; --input-bg: #f8fcf9; --drop-zone-border: #006437; }
    body.theme-saopaulo { --primary-color: #df2128; --primary-hover: #000000; --bg-body: #a81826; --bg-card: #ffffff; --text-main: #000000; --border-color: #000000; --input-bg: #fff5f5; --drop-zone-border: #df2128; }
    body.theme-dark { --primary-color: #4a9eff; --primary-hover: #0077cc; --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0; --border-color: #333; --input-bg: #2d2d2d; --drop-zone-bg: #252525; --drop-zone-border:#444; }
    /* Estilos Temas Específicos */
    body.theme-palmeiras .button-row { background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg'); background-repeat: no-repeat; background-position: right 15px center; background-size: 42px; padding-right: 70px; border: 1px solid #006437; }
    body.theme-saopaulo .button-row { background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Brasao_do_Sao_Paulo_Futebol_Clube.svg/1024px-Brasao_do_Sao_Paulo_Futebol_Clube.svg.png'); background-repeat: no-repeat; background-position: right 15px center; background-size: 40px; padding-right: 70px; border-top: 3px solid #df2128; border-bottom: 3px solid #000000; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: var(--font-family); background-color: var(--bg-body); color: var(--text-main); transition: background 0.3s ease; }
    #container { display: flex; height: 100vh; padding: 11px; box-sizing: border-box; gap: 15px; }
    .form-container { background: var(--bg-card); padding: 10px; border-radius: var(--border-radius); width: 480px; min-width: 350px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow-y: auto; height: 100%; box-sizing: border-box; border: 1px solid var(--border-color); }
    .preview-container { flex-grow: 1; display: flex; flex-direction: column; height: 100%; min-width: 0; }
    #previewFrame { flex-grow: 1; width: 100%; border: none; border-radius: var(--border-radius); background: #525659; }
    .button-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; background: var(--bg-card); padding: 8px; border-radius: var(--border-radius); border: 1px solid var(--border-color); flex-shrink: 0; }
    #imgListContainer, #pdfListContainer { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .item-tag { background: var(--primary-color); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 8px; cursor: grab; user-select: none; border: 1px solid rgba(0,0,0,0.1); }
    .item-tag.dragging { opacity: 0.5; }
    fieldset { border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 8px; margin-bottom: 8px; }
    legend { font-weight: bold; padding: 0 3px; color: var(--primary-color); }
    label { display: block; margin-top: 5px; font-weight: 600; font-size: 0.9rem; }
    input:not([type="checkbox"]), textarea, select { width: 100%; padding: 5px; margin-top: 3px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); border-radius: 6px; box-sizing: border-box; }
    button { padding: 6px 12px; border: none; background: var(--primary-color); color: #fff; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .drop-zone { border: 2px dashed var(--drop-zone-border); border-radius: var(--border-radius); padding: 10px; text-align: center; background: var(--drop-zone-bg); cursor: pointer; position: relative; }
    .drop-zone input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    #messageBox { margin-top: 10px; padding: 10px; border-radius: var(--border-radius); display: none; text-align: center; }
    #statusIndicator { font-size: 0.85rem; color: var(--primary-color); margin-left: auto; font-weight: bold; }
    </style>
</head>
<body class="theme-default">
<div id="container">
  <div class="form-container">
    <fieldset>
      <legend>Dados da Notificação</legend>
      <label>Telefone(s) (use ; para separar):</label>
      <input type="text" id="telefone" placeholder="(44) 9999-9999 ; (44) 8888-8888" class="auto-update">
      <label>Nome(s):</label>
      <input type="text" id="nomeContato" placeholder="Nome completo" class="auto-update">
      <label>Ocorrência:</label>
      <textarea id="ocorrencia" rows="4" placeholder="Parecer..." class="auto-update"></textarea>
      
      <div style="margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 2fr; gap: 4px;">
          <label class="checkbox-label"><input type="checkbox" id="checkWhatsapp" class="presetPhrase" data-is-whatsapp="true"> WhatsApp</label>
          <label class="checkbox-label"><input type="checkbox" class="presetPhrase" data-text="Cadastro incompleto. Notificação deixada  após três tentativas de entrega frustradas ()."> Incompleto</label>
          <label class="checkbox-label"><input type="checkbox" class="presetPhrase" data-text="Terreno baldio. Proprietário atual ou herdeiros não localizados."> Terreno</label>
          <label class="checkbox-label"><input type="checkbox" class="presetPhrase" data-text="Contribuinte recusou receber a notificação. Comprovante em anexo."> Recusa</label>
	  <label class="checkbox-label"><input type="checkbox" class="presetPhrase" data-text="Notificação enviada por carta de Aviso de Recebimento (A.R) assinada."> A.R.</label>
    	  <label class="checkbox-label"><input type="checkbox" class="presetPhrase" data-text="TEXTO DA NOVA FRASE 2."> </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Arquivos PDF (Arraste para ordenar)</legend>
      <div class="drop-zone" id="pdfDropZone">
          <input type="file" id="fileInput" accept="application/pdf" multiple>
          <p><strong>PDFs</strong><br>Clique ou Arraste múltiplos arquivos</p>
      </div>
      <div id="pdfListContainer"></div>
    </fieldset>

    <fieldset>
      <legend>Anexos (Arraste para ordenar)</legend>
      <div class="drop-zone" id="imgDropZone">
          <input type="file" id="imgInput" accept="image/*" multiple>
          <p><strong>Imagens</strong><br>Clique ou Arraste</p>
      </div>
      <div id="imgListContainer"></div>
    </fieldset>

    <div id="messageBox"></div>
    <div style="margin-top: auto;">
        <button id="clearBtn" style="width: 100%; background: #d32f2f;">Limpar Tudo</button>
    </div>
  </div>

  <div class="preview-container">
    <div class="button-row">
      <button id="previewBtn">🔄 Atualizar</button>
      <button id="downloadBtn" style="background: #2e0404;">💾 Download</button>
      <span id="statusIndicator"></span>
      <select id="themeSelect" style="width: auto; margin: 0 10px;">
          <option value="default">🔵 Padrão</option>
          <option value="gold">🟡 Dourado</option>
          <option value="pink">🌸 Rosa</option>
          <option value="purple">🟣 Roxo</option>
          <option value="palmeiras">🐷 Verdão</option>
          <option value="saopaulo">🇾🇪 Tricolor</option>
          <option value="dark">🌑 Modo Escuro</option>
      </select>
    </div>
    <iframe id="previewFrame"></iframe>
  </div>
</div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const AppState = { pdfs: [], images: [], isProcessing: false };
    const CONFIG = { margins: { left: 41, right: 41, top: 30, bottom: 40 }, maxRectHeight: 160 };

    const themeSelect = document.getElementById('themeSelect');
    const applyTheme = (themeName) => { document.body.className = themeName === 'default' ? '' : 'theme-' + themeName; };
    themeSelect.addEventListener('change', (e) => { applyTheme(e.target.value); localStorage.setItem('selectedTheme', e.target.value); });
    const savedTheme = localStorage.getItem('selectedTheme');
    if (savedTheme) { themeSelect.value = savedTheme; applyTheme(savedTheme); }

    function showMessage(msg, isError = true) {
        const box = document.getElementById("messageBox");
        box.textContent = msg; box.style.display = "block";
        box.style.background = isError ? "#fdd" : "#dfd";
        setTimeout(() => box.style.display = "none", 3000);
    }

    const debounce = (func, wait) => {
        let timeout;
        return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); };
    };

    function setStatus(msg) { document.getElementById('statusIndicator').textContent = msg; }

    // Renderiza e gerencia lista de Imagens
    function renderImageList() {
        const container = document.getElementById('imgListContainer');
        container.innerHTML = '';
        AppState.images.forEach((img, index) => {
            const tag = document.createElement('div');
            tag.className = 'item-tag'; tag.draggable = true; tag.dataset.index = index;
            tag.innerHTML = `${img.name} <span class="remove-btn" style="cursor:pointer;" title="Remover">×</span>`;
            tag.querySelector('.remove-btn').onclick = (e) => { e.stopPropagation(); AppState.images.splice(index, 1); renderImageList(); triggerPreviewUpdate(); };
            tag.addEventListener('dragstart', () => tag.classList.add('dragging'));
            tag.addEventListener('dragend', () => { tag.classList.remove('dragging'); reorderImages(); });
            container.appendChild(tag);
        });
    }

    function reorderImages() {
        const newOrder = [...document.querySelectorAll('#imgListContainer .item-tag')].map(tag => AppState.images[tag.dataset.index]);
        AppState.images = newOrder; renderImageList(); triggerPreviewUpdate();
    }

    function handleImageFiles(files) {
        const newFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
        AppState.images.push(...newFiles); renderImageList(); triggerPreviewUpdate();
    }

    // Renderiza e gerencia lista de PDFs
    function renderPdfList() {
        const container = document.getElementById('pdfListContainer');
        container.innerHTML = '';
        AppState.pdfs.forEach((pdf, index) => {
            const tag = document.createElement('div');
            tag.className = 'item-tag'; tag.draggable = true; tag.dataset.index = index;
            tag.innerHTML = `${pdf.name} <span class="remove-btn" style="cursor:pointer;" title="Remover">×</span>`;
            tag.querySelector('.remove-btn').onclick = (e) => { e.stopPropagation(); AppState.pdfs.splice(index, 1); renderPdfList(); triggerPreviewUpdate(); };
            tag.addEventListener('dragstart', () => tag.classList.add('dragging'));
            tag.addEventListener('dragend', () => { tag.classList.remove('dragging'); reorderPdfs(); });
            container.appendChild(tag);
        });
    }

    function reorderPdfs() {
        const newOrder = [...document.querySelectorAll('#pdfListContainer .item-tag')].map(tag => AppState.pdfs[tag.dataset.index]);
        AppState.pdfs = newOrder; renderPdfList(); triggerPreviewUpdate();
    }

    async function handlePdfFiles(files) {
        const newFiles = Array.from(files).filter(f => f.type === 'application/pdf');
        for (let file of newFiles) {
            const buffer = await file.arrayBuffer();
            AppState.pdfs.push({ name: file.name, buffer });
        }
        renderPdfList();
        triggerPreviewUpdate();
    }

    async function findTextPosition(pdf, searchText) {
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const item = content.items.find(it => it.str.includes(searchText));
            if (item) return { page: i - 1, y: item.transform[5] };
        }
        return null;
    }

    async function gerarPdfBytes() {
        if (AppState.pdfs.length === 0) return null;

        const mergedPdf = await PDFLib.PDFDocument.create();

        // Extrai a primeira página de todos os PDFs carregados (mantendo a lógica original)
        for (let i = 0; i < AppState.pdfs.length; i++) {
            const srcDoc = await PDFLib.PDFDocument.load(AppState.pdfs[i].buffer);
            const [copiedPage] = await mergedPdf.copyPages(srcDoc, [0]);
            mergedPdf.addPage(copiedPage);
        }

        const fontBold = await mergedPdf.embedFont(PDFLib.StandardFonts.HelveticaBold);
        const fontReg = await mergedPdf.embedFont(PDFLib.StandardFonts.Helvetica);
        const page1 = mergedPdf.getPages()[0];
        const { width, height } = page1.getSize();

        // Usa o primeiro PDF para calcular posição do texto
        const pdfJsDoc = await pdfjsLib.getDocument({ data: AppState.pdfs[0].buffer }).promise;
        const pos = await findTextPosition(pdfJsDoc, "Gerência de Valores em Carteira");

        let boxPage = page1;
        let boxY = pos ? pos.y - 12 - CONFIG.maxRectHeight : height - 50 - CONFIG.maxRectHeight;

        boxPage.drawRectangle({
            x: CONFIG.margins.left, y: boxY, width: width - (CONFIG.margins.left * 2), height: CONFIG.maxRectHeight,
            borderWidth: 1, borderColor: PDFLib.rgb(0,0,0), color: PDFLib.rgb(1,1,1)
        });

        const title = "ENTREGA DE NOTIFICAÇÕES - PROTESTO";
        boxPage.drawText(title, { x: width/2 - fontBold.widthOfTextAtSize(title, 11)/2, y: boxY + CONFIG.maxRectHeight - 20, size: 11, font: fontBold });

        const fields = [
            { l: "Telefone(s):", v: document.getElementById('telefone').value },
            { l: "Nome(s):", v: document.getElementById('nomeContato').value },
            { l: "Ocorrência:", v: document.getElementById('ocorrencia').value }
        ];

        let cursorY = boxY + CONFIG.maxRectHeight - 40;
        fields.forEach(f => {
            boxPage.drawText(f.l, { x: CONFIG.margins.left + 10, y: cursorY, size: 10, font: fontBold });
            boxPage.drawText(f.v, { x: CONFIG.margins.left + 100, y: cursorY, size: 10, font: fontReg, maxWidth: width - 250, lineHeight: 12 });
            cursorY -= 15;
        });

        let imgPage = boxPage; let imgY = boxY - 20;
        for (const file of AppState.images) {
            const imgBytes = await file.arrayBuffer();
            const img = file.type === "image/png" ? await mergedPdf.embedPng(imgBytes) : await mergedPdf.embedJpg(imgBytes);
            const dims = img.scaleToFit(width - 80, 350);
            if (imgY - dims.height < CONFIG.margins.bottom) { imgPage = mergedPdf.addPage([width, height]); imgY = height - CONFIG.margins.top; }
            imgPage.drawImage(img, { x: width/2 - dims.width/2, y: imgY - dims.height, width: dims.width, height: dims.height });
            imgY -= dims.height + 20;
        }
        return await mergedPdf.save();
    }

    const triggerPreviewUpdate = debounce(async () => {
        if (AppState.pdfs.length === 0) {
            document.getElementById("previewFrame").src = "";
            return;
        }
        setStatus("⏳...");
        const bytes = await gerarPdfBytes();
        const blob = new Blob([bytes], { type: "application/pdf" });
        document.getElementById("previewFrame").src = URL.createObjectURL(blob);
        setStatus("");
    }, 800);

    // Eventos de entrada
    document.querySelectorAll('.auto-update').forEach(i => i.addEventListener('input', triggerPreviewUpdate));
    document.getElementById("fileInput").onchange = (e) => handlePdfFiles(e.target.files);
    document.getElementById("imgInput").onchange = (e) => handleImageFiles(e.target.files);
    document.getElementById("clearBtn").onclick = () => location.reload();
    document.getElementById("previewBtn").onclick = triggerPreviewUpdate;
    
    // Frases Prontas
    document.querySelectorAll('.presetPhrase').forEach(cb => {
        cb.onchange = () => {
            const nome = document.getElementById('nomeContato').value || "_____";
            const phrases = Array.from(document.querySelectorAll('.presetPhrase:checked')).map(c => {
                if(c.dataset.isWhatsapp) return `Notificação enviada cia WhatsApp ao Sr(a). ${nome}. Comprovante em anexo.`;
                return c.dataset.text;
            });
            document.getElementById('ocorrencia').value = phrases.join('\n');
            triggerPreviewUpdate();
        };
    });

    // Download
    document.getElementById("downloadBtn").onclick = async () => {
        try {
            const bytes = await gerarPdfBytes();
            if (!bytes) { showMessage("Nenhum PDF gerado."); return; }
            const blob = new Blob([bytes], { type: "application/pdf" });
            const suggestedName = AppState.pdfs.length > 0 ? AppState.pdfs[0].name : "Notificacao.pdf";
            
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({ suggestedName, types: [{ description: 'PDF', accept: { 'application/pdf': ['.pdf'] } }] });
                    const writable = await handle.createWritable(); await writable.write(blob); await writable.close(); return;
                } catch (err) { if (err.name === 'AbortError') return; }
            }
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = suggestedName; link.click();
        } catch (e) { showMessage("Erro ao baixar: " + e.message); }
    };

    // Máscara Telefones
    document.getElementById('telefone').oninput = (e) => {
        let value = e.target.value;
        let partes = value.split(';');
        let formatadas = partes.map(parte => {
            let nums = parte.replace(/\D/g, '');
            if (nums.length > 10) return nums.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
            else if (nums.length > 6) return nums.replace(/^(\d{2})(\d{4})(\d{4}).*/, '($1) $2-$3');
            else if (nums.length > 2) return nums.replace(/^(\d{2})(\d+)/, '($1) $2');
            else if (nums.length > 0) return nums.replace(/^(\d+)/, '($1');
            return nums;
        });
        e.target.value = formatadas.join('; ');
    };
});
</script>
</body>
</html>
